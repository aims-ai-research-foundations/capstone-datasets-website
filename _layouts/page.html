---
layout: default
---

<div class="page-header">
  <div class="container">
    {% if page.breadcrumb %}
    <nav class="page-header__breadcrumb">
      <a href="{{ '/' | relative_url }}">Home</a>
      <span>/</span>
      <span>{{ page.title }}</span>
    </nav>
    {% endif %}
    <h1 class="page-header__title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-header__description">{{ page.description }}</p>
    {% endif %}
  </div>
</div>

<div class="container">
  <div class="section">
    {{ content }}
  </div>
</div>
