- id: "01-build-slm"
  number: "01"
  title: "Build Your Own Small Language Model"
  short_title: "Build SLM"
  description: "Learn the fundamentals of language modeling by building a small language model from scratch. Understand tokenization, vocabulary construction, and basic model architecture."
  icon: "cube"
  color: "#3B82F6"
  learning_outcomes:
    - "Understand the core components of language models"
    - "Implement tokenization and vocabulary building"
    - "Train a basic language model on text data"
    - "Evaluate model performance with perplexity"
  dataset_tags:
    - "text-corpora"
    - "tokenization"
    - "language-modeling"

- id: "02-represent-data"
  number: "02"
  title: "Represent Your Language Data"
  short_title: "Data Representation"
  description: "Explore techniques for representing text data as vectors. Learn about embeddings, word2vec, and modern representation learning approaches."
  icon: "vector-square"
  color: "#8B5CF6"
  learning_outcomes:
    - "Convert text to numerical representations"
    - "Understand word embeddings and their properties"
    - "Work with multilingual representations"
    - "Apply embeddings to downstream tasks"
  dataset_tags:
    - "embeddings"
    - "multilingual"
    - "word-vectors"

- id: "03-neural-networks"
  number: "03"
  title: "Design and Train Neural Networks"
  short_title: "Neural Networks"
  description: "Master the fundamentals of neural network design, training, and optimization. Build and train networks for various NLP tasks."
  icon: "network-wired"
  color: "#EC4899"
  learning_outcomes:
    - "Design neural network architectures"
    - "Implement forward and backward propagation"
    - "Apply optimization techniques"
    - "Handle overfitting and regularization"
  dataset_tags:
    - "classification"
    - "regression"
    - "sequence-modeling"

- id: "04-transformer"
  number: "04"
  title: "Assemble Your Transformer Architecture"
  short_title: "Transformers"
  description: "Dive deep into the transformer architecture. Understand attention mechanisms, positional encoding, and build your own transformer model."
  icon: "microchip"
  color: "#F59E0B"
  learning_outcomes:
    - "Understand self-attention mechanisms"
    - "Implement multi-head attention"
    - "Build encoder and decoder stacks"
    - "Train transformers for sequence tasks"
  dataset_tags:
    - "sequence-to-sequence"
    - "attention"
    - "translation"

- id: "05-finetune"
  number: "05"
  title: "Finetune Your Model"
  short_title: "Fine-tuning"
  description: "Learn to adapt pre-trained models to specific tasks and domains. Master transfer learning and fine-tuning techniques."
  icon: "sliders"
  color: "#10B981"
  learning_outcomes:
    - "Apply transfer learning effectively"
    - "Fine-tune models for specific tasks"
    - "Handle domain adaptation"
    - "Implement few-shot learning"
  dataset_tags:
    - "fine-tuning"
    - "domain-specific"
    - "task-specific"

- id: "06-align"
  number: "06"
  title: "Align Your Model"
  short_title: "Alignment"
  description: "Ensure your models behave according to human preferences and values. Learn about RLHF, preference learning, and safety techniques."
  icon: "compass"
  color: "#EF4444"
  learning_outcomes:
    - "Understand alignment challenges"
    - "Implement preference learning"
    - "Apply RLHF techniques"
    - "Evaluate model safety"
  dataset_tags:
    - "preference-data"
    - "human-feedback"
    - "safety"

- id: "07-accelerate"
  number: "07"
  title: "Accelerate Your Model"
  short_title: "Acceleration"
  description: "Optimize your models for speed and efficiency. Learn quantization, pruning, and deployment strategies for resource-constrained environments."
  icon: "bolt"
  color: "#6366F1"
  learning_outcomes:
    - "Apply model quantization"
    - "Implement model pruning"
    - "Optimize inference speed"
    - "Deploy to edge devices"
  dataset_tags:
    - "optimization"
    - "quantization"
    - "edge-deployment"

- id: "08-capstone"
  number: "08"
  title: "Capstone: Develop Your Model for Real-World Impact"
  short_title: "Capstone"
  description: "Apply everything you've learned to build a complete AI solution for a real-world African challenge. Showcase responsible innovation."
  icon: "rocket"
  color: "#059669"
  learning_outcomes:
    - "Define a meaningful problem"
    - "Design an end-to-end solution"
    - "Implement responsible AI practices"
    - "Present and showcase your work"
  dataset_tags:
    - "healthcare"
    - "agriculture"
    - "finance"
    - "education"
    - "climate"
