- id: "01-build-slm"
  number: "01"
  title: "Build Your Own Small Language Model"
  short_title: "Build SLM"
  description: "Learn the fundamentals of language modeling by building a small language model from scratch. This introductory course demystifies the creation of language models, emphasizing that you don't need massive compute resources to understand the fundamental principles of Generative AI."
  duration: "6 hours"
  icon: "cube"
  color: "#4E7FD6"
  key_topics:
    - "Fundamentals of language modeling"
    - "Evolution from n-gram models to Transformers"
    - "The machine learning development pipeline"
    - "Small Language Models (SLMs) as pedagogical tools"
  learning_outcomes:
    - "Gain a high-level understanding of how text generation works"
    - "Understand the strengths and limitations of different modeling architectures"
    - "Identify the trade-offs between model size and performance"
    - "Build vocabularies and train tokenizers"
    - "Conceptualize AI problems within a local community context"
  practical_projects:
    - "Write code to generate text and identify patterns using simple models"
    - "Analyze real-world research engineering workflows"
    - "Train a unidirectional LSTM or Transformer from scratch on African language text"
  dataset_tags:
    - "text-corpora"
    - "tokenization"
    - "language-modeling"

- id: "02-represent-data"
  number: "02"
  title: "Represent Your Language Data"
  short_title: "Data Representation"
  description: "Data is the fuel of AI. This course focuses on the critical pre-processing stage, teaching you how to convert human language into a format that machines can process mathematically. Learn about tokenization, embeddings, and responsible data documentation."
  duration: "4 hours"
  prerequisites:
    - "Completion of Course 01"
    - "Familiarity with linear algebra (vectors/matrices)"
  icon: "vector-square"
  color: "#8A5BD4"
  key_topics:
    - "Tokenization: Breaking text into smaller units (tokens)"
    - "Embeddings: Representing tokens as vectors in high-dimensional space"
    - "Vector and matrix operations relevant to NLP"
    - "Data Cards: A framework for transparent dataset documentation"
  learning_outcomes:
    - "Investigate tools for structuring text data"
    - "Analyze how meaning is represented geometrically in language models"
    - "Think critically about bias introduced during data preparation"
    - "Implement tokenizers and create word embeddings"
    - "Design datasets with focus on transparency and accountability"
  practical_projects:
    - "Hands-on tokenization and embedding generation"
    - "Ethics exercise: Designing a dataset to mitigate algorithmic bias"
    - "Train a BPE tokenizer on African languages and compare vocabulary sizes"
  dataset_tags:
    - "embeddings"
    - "multilingual"
    - "word-vectors"
    - "parallel-corpora"

- id: "03-neural-networks"
  number: "03"
  title: "Design and Train Neural Networks"
  short_title: "Neural Networks"
  description: "This course enters the 'engine room' of deep learning. Move from abstract concepts to the concrete mechanics of training neural networks, including supervised learning, classification, sentiment analysis, and Named Entity Recognition."
  duration: "4 hours"
  icon: "network-wired"
  color: "#B23A2E"
  key_topics:
    - "Multilayer Perceptrons (MLPs): The building blocks of deep learning"
    - "The Training Loop: Forward pass, loss calculation, backpropagation"
    - "Optimization: Gradient descent algorithms"
    - "Diagnostics: Identifying overfitting and underfitting"
  learning_outcomes:
    - "Understand the mechanics of training a neural network"
    - "Learn to spot and mitigate common training issues"
    - "Evaluate model performance on classification tasks"
    - "Implement MLPs from scratch or using frameworks"
    - "Apply backpropagation theory to code"
  practical_projects:
    - "Implement and evaluate an MLP for classification tasks"
    - "Social Impact Analysis: Anticipate potential risks of trained models"
    - "Train a Bi-LSTM-CRF model for NER in African languages"
  dataset_tags:
    - "classification"
    - "ner"
    - "sentiment-analysis"
    - "sequence-modeling"

- id: "04-transformer"
  number: "04"
  title: "Assemble Your Transformer Architecture"
  short_title: "Transformers"
  description: "This is the theoretical centerpiece of the curriculum. Explore the architecture that underpins modern Generative AI like Gemini and GPT. Understand attention mechanisms, positional encoding, and build your own transformer model."
  duration: "4 hours"
  icon: "microchip"
  color: "#E0A82E"
  key_topics:
    - "The Transformer: History and architecture"
    - "Self-Attention Mechanisms: How models weigh word importance"
    - "Masked Attention: Preventing the model from seeing the future"
    - "Multi-Head Attention: Capturing different relationship types"
    - "Context-sensitive next-token prediction"
  learning_outcomes:
    - "Investigate how Transformers process prompts"
    - "Understand the mathematical mechanism of attention"
    - "Visualize how a model 'thinks' by examining attention weights"
    - "Differentiate between Transformer components (encoders/decoders)"
    - "Build retrieval-based QA systems"
  practical_projects:
    - "Visualize attention weights to see model focus during generation"
    - "Fine-tune mBERT for answer span extraction"
    - "Build a cross-lingual QA system using African language documents"
  dataset_tags:
    - "question-answering"
    - "summarization"
    - "reading-comprehension"
    - "translation"

- id: "05-finetune"
  number: "05"
  title: "Finetune Your Model"
  short_title: "Fine-tuning"
  description: "Moving from theory to application, this course addresses the reality that most researchers adapt existing foundation models rather than training from scratch. Learn transfer learning, fine-tuning techniques, and domain adaptation for African contexts."
  icon: "sliders"
  color: "#3D9E5A"
  key_topics:
    - "Transfer Learning: Principles of adapting pre-trained models"
    - "Fine-tuning Techniques: Full fine-tuning vs Parameter-Efficient (PEFT)"
    - "Domain adaptation for medical, legal, agricultural contexts"
    - "Memory bottlenecks and efficiency in training"
    - "Instruction-following datasets"
  learning_outcomes:
    - "Learn the vital skill of adapting pre-trained models"
    - "Understand the computational trade-offs of fine-tuning"
    - "Apply fine-tuning to solve specific African problems"
    - "Execute fine-tuning workflows efficiently"
    - "Specialize general-purpose models for niche tasks"
  practical_projects:
    - "Fine-tune a medical LLM for African healthcare questions"
    - "Adapt a model for local language translation"
    - "Fine-tune Llama to follow instructions in African languages"
  dataset_tags:
    - "fine-tuning"
    - "domain-specific"
    - "instruction-tuning"
    - "medical"
    - "agricultural"

- id: "06-align"
  number: "06"
  title: "Align Your Model"
  short_title: "Alignment"
  description: "This course tackles the critical challenge of making AI systems helpful, harmless, and honest. Learn to treat alignment as a technical engineering discipline, including RLHF, preference learning, bias evaluation, and safety techniques for African contexts."
  icon: "compass"
  color: "#2F5BAE"
  key_topics:
    - "AI Alignment: Defining human values and intentions"
    - "RLHF (Reinforcement Learning from Human Feedback)"
    - "Mitigating toxicity and bias"
    - "Safety evaluations and Red Teaming"
    - "Cultural sensitivity in African contexts"
  learning_outcomes:
    - "Explore techniques to ensure model outputs align with human intent"
    - "Understand technical methods for suppressing harmful outputs"
    - "Integrate ethical considerations into the engineering lifecycle"
    - "Implement alignment and safety techniques"
    - "Address algorithmic bias technically"
  practical_projects:
    - "Train a Safety Guardrail model for African language chatbots"
    - "Evaluate model bias using African stereotype datasets"
    - "Implement DPO (Direct Preference Optimization)"
  dataset_tags:
    - "preference-data"
    - "human-feedback"
    - "safety"
    - "bias-evaluation"
    - "hate-speech"

- id: "07-accelerate"
  number: "07"
  title: "Accelerate Your Model"
  short_title: "Acceleration"
  description: "A functional model is useless if too slow or expensive to run. This course focuses on MLOps and optimization, particularly relevant for the African context where compute resources may be constrained and mobile deployment is essential."
  icon: "bolt"
  color: "#B86A1E"
  key_topics:
    - "Inference Optimization: Reducing latency"
    - "Quantization: Reducing model precision (8-bit, 4-bit)"
    - "Distillation: Training smaller student models"
    - "Hardware acceleration (TPUs/GPUs)"
    - "Mobile and edge deployment"
  learning_outcomes:
    - "Understand the engineering challenges of deployment"
    - "Learn techniques to make models efficient for real-world use"
    - "Bridge the gap between research prototype and production"
    - "Deploy models on resource-constrained devices"
    - "Benchmark accuracy vs speed trade-offs"
  practical_projects:
    - "Quantize models to 8-bit and benchmark accuracy loss"
    - "Knowledge Distillation: Teacher to Student model transfer"
    - "Deploy a quantized ASR model on mobile devices"
  dataset_tags:
    - "benchmarking"
    - "optimization"
    - "quantization"
    - "edge-deployment"

- id: "08-capstone"
  number: "08"
  title: "Capstone: Develop Your Model for Real-World Impact"
  short_title: "Capstone"
  description: "The curriculum culminates in a comprehensive project that requires you to synthesize all previous learning. Build an end-to-end AI solution for real-world African challenges in healthcare, agriculture, climate, finance, or education."
  icon: "rocket"
  color: "#2D1A4D"
  key_topics:
    - "Independent research and problem formulation"
    - "End-to-end model development pipeline"
    - "Real-world application focus"
    - "Responsible AI in African contexts"
    - "Project presentation and showcasing"
  learning_outcomes:
    - "Transition from student to independent researcher"
    - "Apply technical skills to novel African problems"
    - "Demonstrate ability to build responsible AI solutions"
    - "Curate and represent data (Course 02)"
    - "Select architecture, train, fine-tune, align, and optimize"
  capstone_areas:
    - title: "Low-Resource Language Translation"
      description: "Develop models for African languages underrepresented in global datasets"
    - title: "Agricultural Intelligence"
      description: "Predict crop yields or identify plant diseases based on local data"
    - title: "Healthcare Diagnostics"
      description: "Fine-tune models for diseases prevalent in Sub-Saharan Africa"
    - title: "Climate Resilience"
      description: "Analyze local climate data to predict weather patterns or flood risks"
    - title: "Financial Inclusion"
      description: "Build credit scoring proxies for unbanked populations"
  dataset_tags:
    - "healthcare"
    - "agriculture"
    - "finance"
    - "education"
    - "climate"
