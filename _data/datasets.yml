# Text Corpora
- id: "cc100-african"
  name: "CC-100 (African Languages)"
  tagline: "Web-crawled Text Corpus for African Languages"
  description: |
    CC-100 is a large-scale web-crawled corpus covering 100+ languages. This subset focuses on African languages
    including Swahili, Yoruba, Hausa, Amharic, and others. Useful for pre-training language models.
  source_url: "https://huggingface.co/datasets/cc100"
  source_type: "huggingface"
  paper_url: "https://arxiv.org/abs/1911.00359"
  languages:
    - { code: "swa", name: "Swahili" }
    - { code: "yor", name: "Yoruba" }
    - { code: "amh", name: "Amharic" }
  countries: ["KE", "NG", "ET"]
  tasks: ["language-modeling", "pretraining"]
  size: "5GB+"
  format: ["Text"]
  license: "Common Crawl Terms"
  difficulty: "advanced"
  compute: "high"
  colab_friendly: false
  courses: ["01-build-slm", "02-represent-data"]
  quickstart: |
    from datasets import load_dataset

    # Load Swahili corpus (streaming for large data)
    dataset = load_dataset("cc100", lang="sw", streaming=True)

    # Get samples
    for sample in dataset['train'].take(5):
        print(sample['text'][:200])
  project_ideas:
    - title: "African Language Model"
      description: "Pre-train a small language model on African language data"
      difficulty: "advanced"
  ethics:
    - "Web-crawled data may contain biases"
    - "Quality varies across sources"
    - "May contain inappropriate content"
  featured: false
  date_added: "2026-01-20"

