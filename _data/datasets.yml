# African Languages NLP Datasets
- id: "masakhaner-v2"
  name: "MasakhaNER 2.0"
  tagline: "Named Entity Recognition for 21 African Languages"
  description: |
    MasakhaNER 2.0 is a comprehensive named entity recognition dataset covering 21 African languages.
    It includes annotations for Person (PER), Organization (ORG), Location (LOC), and Date (DATE) entities.
    Created by the Masakhane community, it represents a significant resource for African language NLP research.
  source_url: "https://huggingface.co/datasets/masakhane/masakhaner2"
  source_type: "huggingface"
  paper_url: "https://arxiv.org/abs/2210.12391"
  languages:
    - { code: "swa", name: "Swahili" }
    - { code: "yor", name: "Yoruba" }
    - { code: "hau", name: "Hausa" }
    - { code: "ibo", name: "Igbo" }
    - { code: "amh", name: "Amharic" }
    - { code: "zul", name: "Zulu" }
  countries: ["KE", "NG", "GH", "ZA", "ET"]
  tasks: ["named-entity-recognition", "sequence-labeling", "token-classification"]
  size: "50MB"
  format: ["JSON", "CoNLL"]
  license: "CC-BY-4.0"
  difficulty: "intermediate"
  compute: "low"
  colab_friendly: true
  courses: ["02-represent-data", "05-finetune", "08-capstone"]
  quickstart: |
    from datasets import load_dataset

    # Load Swahili subset
    dataset = load_dataset("masakhane/masakhaner2", "swa")

    # View a sample
    print(dataset['train'][0])
    # Output: {'tokens': ['Waziri', 'wa', ...], 'ner_tags': [1, 0, ...]}

    # Get label names
    print(dataset['train'].features['ner_tags'].feature.names)
  project_ideas:
    - title: "Multilingual News NER System"
      description: "Build a system that extracts named entities from African news articles across multiple languages"
      difficulty: "intermediate"
    - title: "Cross-lingual Transfer Study"
      description: "Investigate how NER knowledge transfers between related African languages"
      difficulty: "advanced"
  ethics:
    - "Geographic bias towards regions with more annotators"
    - "Entity categories based on Western NER conventions may not cover all local contexts"
    - "Performance varies significantly across languages"
  featured: true
  date_added: "2026-01-20"

- id: "afrisenti"
  name: "AfriSenti"
  tagline: "Sentiment Analysis for 14 African Languages"
  description: |
    AfriSenti is a multilingual sentiment analysis dataset for 14 African languages.
    It contains Twitter data annotated for positive, negative, and neutral sentiment.
    The dataset enables research on sentiment analysis in low-resource African languages.
  source_url: "https://huggingface.co/datasets/masakhane/afrisenti"
  source_type: "huggingface"
  paper_url: "https://arxiv.org/abs/2302.08956"
  languages:
    - { code: "swa", name: "Swahili" }
    - { code: "yor", name: "Yoruba" }
    - { code: "hau", name: "Hausa" }
    - { code: "amh", name: "Amharic" }
    - { code: "twi", name: "Twi" }
    - { code: "pcm", name: "Nigerian Pidgin" }
  countries: ["KE", "NG", "GH", "ET", "ZA"]
  tasks: ["sentiment-analysis", "text-classification"]
  size: "25MB"
  format: ["CSV", "JSON"]
  license: "CC-BY-4.0"
  difficulty: "beginner"
  compute: "low"
  colab_friendly: true
  courses: ["02-represent-data", "03-neural-networks", "05-finetune", "08-capstone"]
  quickstart: |
    from datasets import load_dataset

    # Load Hausa sentiment data
    dataset = load_dataset("masakhane/afrisenti", "hau")

    # View a sample
    print(dataset['train'][0])
    # Output: {'text': '...', 'label': 1}

    # Label mapping: 0=negative, 1=neutral, 2=positive
  project_ideas:
    - title: "Social Media Sentiment Monitor"
      description: "Build a dashboard that tracks sentiment about key topics in African social media"
      difficulty: "intermediate"
    - title: "Multilingual Sentiment API"
      description: "Create an API that provides sentiment analysis for multiple African languages"
      difficulty: "intermediate"
  ethics:
    - "Twitter data may not represent general population sentiment"
    - "Urban bias in social media data"
    - "Potential for misuse in surveillance"
  featured: true
  date_added: "2026-01-20"

- id: "mafand-mt"
  name: "MAFAND-MT"
  tagline: "Machine Translation for African Languages"
  description: |
    MAFAND-MT is a machine translation dataset covering 21 African languages paired with English and French.
    It provides parallel corpora for training and evaluating translation systems for African languages.
  source_url: "https://huggingface.co/datasets/masakhane/mafand"
  source_type: "huggingface"
  paper_url: "https://arxiv.org/abs/2204.06487"
  languages:
    - { code: "swa", name: "Swahili" }
    - { code: "yor", name: "Yoruba" }
    - { code: "hau", name: "Hausa" }
    - { code: "zul", name: "Zulu" }
    - { code: "ibo", name: "Igbo" }
  countries: ["KE", "NG", "GH", "ZA"]
  tasks: ["machine-translation", "sequence-to-sequence"]
  size: "100MB"
  format: ["JSON", "TSV"]
  license: "CC-BY-4.0"
  difficulty: "intermediate"
  compute: "medium"
  colab_friendly: true
  courses: ["04-transformer", "05-finetune", "08-capstone"]
  quickstart: |
    from datasets import load_dataset

    # Load English-Swahili translation data
    dataset = load_dataset("masakhane/mafand", "en-swa")

    # View a sample
    print(dataset['train'][0])
    # Output: {'translation': {'en': '...', 'swa': '...'}}
  project_ideas:
    - title: "Bidirectional Translation App"
      description: "Build a mobile-friendly translation app between English and an African language"
      difficulty: "intermediate"
    - title: "Document Translation Pipeline"
      description: "Create a system for translating documents while preserving formatting"
      difficulty: "advanced"
  ethics:
    - "Translation quality varies by language pair"
    - "May not handle code-switching well"
    - "Domain-specific terminology may be missing"
  featured: true
  date_added: "2026-01-20"

