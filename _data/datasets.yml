# Tabular/Structured Datasets
- id: "world-bank-africa"
  name: "World Bank Africa Development Indicators"
  tagline: "Economic and Social Indicators for African Countries"
  description: |
    Comprehensive development indicators for African countries from the World Bank Open Data portal.
    Includes GDP, population, education, health, and infrastructure metrics spanning several decades.
  source_url: "https://data.worldbank.org/region/sub-saharan-africa"
  source_type: "api"
  languages:
    - { code: "eng", name: "English" }
  countries: ["NG", "KE", "GH", "ZA"]
  tasks: ["tabular-analysis", "time-series", "regression"]
  size: "50MB"
  format: ["CSV", "JSON", "Excel"]
  license: "CC-BY-4.0"
  difficulty: "beginner"
  compute: "low"
  colab_friendly: true
  courses: ["01-build-slm", "03-neural-networks", "08-capstone"]
  quickstart: |
    import pandas as pd
    import wbgapi as wb

    # Get GDP data for African countries
    df = wb.data.DataFrame('NY.GDP.MKTP.CD',
                           economy=['NGA', 'KEN', 'GHA', 'ZAF'],
                           time=range(2010, 2024))
    print(df.head())
  project_ideas:
    - title: "Economic Forecasting Model"
      description: "Build a model to forecast GDP growth for African countries"
      difficulty: "intermediate"
    - title: "Development Dashboard"
      description: "Create an interactive dashboard visualizing development indicators"
      difficulty: "beginner"
  ethics:
    - "Data collection methods may vary by country"
    - "Some indicators may have reporting gaps"
  featured: true
  date_added: "2026-01-20"

