<header class="header">
  <div class="container">
    <div class="header__inner">
      <a href="{{ '/' | relative_url }}" class="header__logo" aria-label="AIMS AI Research Foundations Capstone Datasets, home">
        <img src="{{ '/assets/images/logos/logo-white.svg' | relative_url }}" alt="AIMS AI Research Foundations" height="38">
        <span>Capstone Datasets</span>
      </a>

      <nav class="header__nav">
        {% for item in site.data.navigation.main %}
        <a href="{{ item.url | relative_url }}"
           class="header__link {% if page.url == item.url %}active{% endif %}">
          {{ item.title }}
        </a>
        {% endfor %}
      </nav>

      <div class="header__actions">
        <a href="{{ '/datasets/' | relative_url }}" class="btn btn--sm btn--primary header__cta">
          Browse Datasets
        </a>
        <button class="header__mobile-toggle" onclick="toggleMobileNav()" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-nav">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12h18M3 6h18M3 18h18"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<div class="mobile-nav-backdrop" id="mobile-nav-backdrop" onclick="closeMobileNav()"></div>

<nav class="mobile-nav" id="mobile-nav" aria-hidden="true">
  {% for item in site.data.navigation.main %}
  <a href="{{ item.url | relative_url }}"
     class="mobile-nav__link {% if page.url == item.url %}active{% endif %}">
    {{ item.title }}
  </a>
  {% endfor %}
</nav>
